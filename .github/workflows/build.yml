name: Build Monday APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Required for creating releases
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --info --no-daemon 2>&1
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Monday-debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Monday v1.0 (Build ${{ github.run_number }})"
          body: |
            ## Monday AI Assistant — Latest Build

            ### How to Install on Samsung S23 Ultra:
            1. Download `app-debug.apk` below
            2. On phone: Settings → Apps → Install unknown apps → Chrome → Allow
            3. Open the APK file on your phone and tap Install
            4. Open Monday → enter Gemini API key → enable permissions

            ### What's new in this build:
            - Commit: ${{ github.sha }}
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
